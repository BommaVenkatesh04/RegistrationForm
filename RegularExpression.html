<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
    <h4>Regular Expression</h4>
    <label for="name">Enter Name </label>
    <input type="text" id="name" pattern="^[A-Za-z]{2,50}$" name="username"><br><br>
    <label for="phone">Phone Number </label>
    <input type="tel" id="phone" pattern="^+91-[6-9]{1}[0-9]{2}-[0-9]{3}-[0-9]{4}$" name="phone">
    <br><br>

    <label for="Password">Password</label>
    <input type="text" pattern="^(?=(.*\d){2,})(?=(.*[A-Z]){2,})(?=.*[!#%*])[A-Za-z\d!#%*]{10,}$" name="Password">

    <br><br>

   <input type="submit">
   
    </form>
    
</body>
</html>
