<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Spanning</title>
</head>
<body>
   <body>
     <h2>TableSpanning in HTML</h2>
     <table border="2">
        
        <tr>
                <td >1</td>
                <td>2</td>
                <td>3</td>
                <td>4</td>
        </tr>
        <tr>
               <td>1</td>
                <td>2</td>
                <td>3</td>
                <td>4</td>
        </tr>

         <tr>
               <td>1</td>
                <td>2</td>
                <td>3</td>
                <td>4</td>
        </tr>
         <tr>
               <td>1</td>
                <td>2</td>
                <td>3</td>
                <td>4</td>
        </tr>
     </table> 
   <br>
<table border="2">
        
        <tr>
                <td colspan="4">1</td>
              
        </tr>
        <tr>
               <td rowspan="2">1</td>
                <td>2</td>
                <td>3</td>
                <td rowspan="2">4</td>
        </tr>

         <tr>
              
                <td>2</td>
                <td>3</td>
                
                
        </tr>
         <tr>
               <td colspan="4">1</td>
               
        </tr>
     </table> 







</body>
</html>
