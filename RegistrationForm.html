<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Course Registration Form</h2>

    <form action="http://127.0.0.1:5500/HTML/RegistrationForm.html">
        <fieldset>
            <legend>Personal Details</legend>
            <table>
                <tr><td><label for="">First Name</label></td><td><input type="text" name="FN" placeholder="Ex:Srinivas" size="20" maxlength="15"></td></tr>
                <tr><td><label for="">SurName</label></td><td><input type="text" name="LN" placeholder="Ex:Rohit" size="20" maxlength="10"></td></tr>
                <tr><td><label for="">Mobile Number</label></td><td><input type="tel" name="mob" placeholder="Ex:984-456-7890" size="20"></td></tr>
                <tr><td><label for="">Email</label></td><td><input type="email" name="mail" placeholder="srinivas@kodnest.com" size="20"></td></tr>
                <tr><td><label for="">Password</label></td><td><input type="password" name="pwd" placeholder="min 5 characters" size="20"></td></tr>
                <tr><td><label for="">Confirm Password</label></td><td><input type="password" name="cpwd" placeholder="min 5 characters" size="20"></td></tr>
                <tr><td><label for="">DOB</label></td><td><input type="date" name="dob"></td></tr>
                <tr><td><label for="">Gender</label></td><td><input type="radio" name="gender" value="M">Male <input type="radio" name="gender" value="F">Female <input type="radio" name="gender" value="O">Other</td></tr>
                <tr><td><label for="" >Select Country</label></td><td><select name="country">
            <option value="INDIA">INDIA</option>
            <option value="USA">USA </option>
            <option value="ENGLAND">ENGLAND </option>
            <option value="IRELAND">IRELAND</option>
            </select></td></tr>
            <tr><td><label for=""> Upload Picture</label></td><td><input type="file"name="pic"></td></tr>
            <tr><td><input type="reset"></td></tr>
            </table>
        </fieldset>
        
        <fieldset>
            <legend>Course Details</legend>
            <table>
                <tr><td><label for="">Select Course</label></td><td><select name="Course">
                <option value="JFS">Java Full Stack</option>
                <option value="PFS">Python Full Stack</option>
                <option value="TP">Premium Testing</option>
            </select></td></tr>
            <tr><td><label for="">Delivery Mode</label></td> <td><input type="checkbox" name="mode1" value="ON">ONLINE
            <input type="checkbox" name="mode2" value="OF">OFFLINE</td></tr>
            <tr><td><label for="">Comments</label></td></tr>
            </table>
        
            <textarea name="" id="" rows="4" cols="40"></textarea>
        </fieldset>
        <img src="submit.png" height="80" width="80" type="input">
    </form>
</body>
</html>
