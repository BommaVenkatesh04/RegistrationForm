<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag</title>
</head>
<body>
     <h2>Table Tag in HTML</h2>
     <table border="6">
        <caption style="color: brown; text-align: center; caption-side: top;">KodNest Technologies</caption>
        <tr>
            <th>SNo</th>
            <th>Course Name</th>
            <th>Fee</th>

            <tr>
                <td>1</td>
                <td>Full Stack Java</td>
                <td>22000</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Aytomation Testing</td>
                <td>24000</td>
            </tr>
        </tr>




     </table>
</body>
</html>
